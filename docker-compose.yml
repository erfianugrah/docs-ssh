# Local development — builds from source, exposes port directly
services:
  docs-ssh:
    build:
      context: .
      args:
        DOCS_PREBUILT: "false"
    image: docs-ssh:local
    container_name: docs-ssh
    ports:
      - "2222:2222"
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - SYS_CHROOT
      - AUDIT_WRITE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/sshd
      - /var/log
