# Local development — builds from source, exposes port directly
services:
  docs-ssh:
    build:
      context: .
      args:
        DOCS_PREBUILT: "false"
    image: docs-ssh:local
    container_name: docs-ssh
    ports:
      - "2222:2222"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/sshd
