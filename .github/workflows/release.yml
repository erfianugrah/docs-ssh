name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    name: Build & push Docker image (tagged release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch docs
        run: pnpm fetch-docs
        env:
          DOCS_OUT_DIR: ${{ github.workspace }}/docs
          DOCS_WORK_DIR: /tmp/docs-work

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCS_PREBUILT=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Composer
        continue-on-error: true
        env:
          WEBHOOK_URL: https://composer.erfi.io/api/v1/hooks/wh_605deebe349c279a9a2e91e0124b27de
          WEBHOOK_SECRET: ${{ secrets.COMPOSER_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(jq -nc \
            --arg ref "${{ github.ref }}" \
            --arg sha "${{ github.sha }}" \
            --arg repo "${{ github.repository }}" \
            --arg sender "${{ github.actor }}" \
            '{
              ref: $ref,
              after: $sha,
              repository: { full_name: $repo, clone_url: ("https://github.com/" + $repo + ".git") },
              sender: { login: $sender }
            }')
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')"
          curl -fsSL -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"
