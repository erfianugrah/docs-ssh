name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    name: Build & push Docker image (tagged release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch docs
        run: pnpm fetch-docs
        env:
          DOCS_OUT_DIR: ${{ github.workspace }}/docs
          DOCS_WORK_DIR: /tmp/docs-work
          DOCS_MAX_AGE: "0"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCS_PREBUILT=true
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Composer
        run: |
          COMPOSER_HEADERS=(-H "Authorization: Bearer ${{ secrets.COMPOSER_API_KEY }}" -H "X-Requested-With: XMLHttpRequest")
          curl -sf --retry 2 --retry-delay 5 -X POST "${{ secrets.COMPOSER_URL }}/api/v1/stacks/docs-ssh/sync" "${COMPOSER_HEADERS[@]}"
          curl -sf --retry 2 --retry-delay 5 -X POST "${{ secrets.COMPOSER_URL }}/api/v1/stacks/docs-ssh/pull" "${COMPOSER_HEADERS[@]}"
          sleep 5
          curl -sf --retry 3 --retry-delay 10 -X POST "${{ secrets.COMPOSER_URL }}/api/v1/stacks/docs-ssh/up" "${COMPOSER_HEADERS[@]}"

