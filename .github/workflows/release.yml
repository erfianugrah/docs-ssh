name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: docker-push
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (typecheck, unit, e2e, tools.sh sync)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tools.sh is in sync
        run: pnpm generate:tools && git diff --exit-code commands/tools.sh

      - name: Typecheck
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:coverage

      - name: Run E2E tests
        run: pnpm test:e2e

  build-and-push:
    name: Build & push Docker image (tagged release)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch docs
        run: pnpm fetch-docs
        env:
          DOCS_OUT_DIR: ${{ github.workspace }}/docs
          DOCS_WORK_DIR: /tmp/docs-work
          DOCS_MAX_AGE: "0"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCS_PREBUILT=true
            VERSION=${{ github.ref_name }}
            SSH_HOST=${{ vars.DOCS_SSH_HOST || 'docs.erfi.io' }}
            SSH_PORT=${{ vars.DOCS_SSH_PORT || '2222' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Composer
        run: |
          curl -sf --retry 3 --retry-delay 10 -X POST \
            "${{ secrets.COMPOSER_URL }}/api/v1/stacks/docs-ssh/deploy" \
            -H "Authorization: Bearer ${{ secrets.COMPOSER_API_KEY }}" \
            -H "X-Requested-With: XMLHttpRequest"
