name: Probe sources

# Weekly diagnostic — runs scripts/probe-sources.ts to detect
# upstream-format shifts (e.g. an upstream gaining llms-full.txt, or
# losing a /docs path). Posts the report as a workflow artifact and
# opens an issue if the report differs from the previous week's.
#
# This catches the "AWS quietly switched .html → .md in llms.txt"
# scenario before the daily fetch hits it.

on:
  schedule:
    # Sundays 04:00 UTC — well after the daily docs cron and the
    # weekly window for upstreams to ship Friday-evening changes.
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  probe:
    name: Probe upstream availability
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run probe
        run: pnpm tsx scripts/probe-sources.ts > probe-report.tsv 2> probe-progress.log

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: probe-report
          path: |
            probe-report.tsv
            probe-progress.log
          retention-days: 90

      - name: Diff against last week
        id: diff
        # Pull the previous run's artifact (if any) and diff. A
        # non-empty diff means at least one source's recommended
        # ingestion option changed — surface it.
        run: |
          set -e
          # Fetch the previous run's artifact via the API; gracefully
          # skip if there's no prior run yet.
          prev_run=$(gh run list --workflow=probe-sources.yml \
            --status=success --limit=2 --json databaseId \
            --jq '.[1].databaseId' || true)
          if [ -z "$prev_run" ] || [ "$prev_run" = "null" ]; then
            echo "no previous run — nothing to diff" >&2
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p prev
          gh run download "$prev_run" -n probe-report -D prev || {
            echo "previous artifact unavailable — skip" >&2
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          if diff -u prev/probe-report.tsv probe-report.tsv > probe-diff.txt; then
            echo "no changes since last week"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes detected:"
            cat probe-diff.txt
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          gh issue create \
            --title "weekly probe: source-availability changes detected ($(date -u +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
          The weekly source-availability probe detected changes since last run. This usually means one of:

          - An upstream gained or lost an \`llms.txt\`/\`llms-full.txt\` (consider migrating).
          - An upstream's HTTP availability changed (404, redirects, etc).
          - A new source was added or removed since the last run.

          See the full diff in the workflow artifact \`probe-report\` and the run logs.

          Inspect: review \`probe-report.tsv\`, decide whether any source should be migrated to a better ingestion mechanism, and update \`src/application/sources.ts\`.
          EOF
          )" \
            --label "automated,sources" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
